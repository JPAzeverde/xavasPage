<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HUB - Command Center</title>

    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="css/index.css">

    <!-- Validador de Sessão -->
    <script src="js/guard.js"></script>
</head>
<body class="layout-dashboard">

    <header class="header">
        <div class="header__brand">
            <a href="index.html" class="header__logo">
                <h1 class="title-lg">HUB</h1>
            </a>
            <p class="text-small header__status">Online</p>
        </div>

        <button id="btn-menu" class="btn btn--ghost header__menu-toggle">Menu</button>

        <nav id="main-nav" class="header__nav">
            <a href="pages/protocol.html" class="header__link">Protocol</a>
            <a href="pages/operations.html" class="header__link">Operations</a>
            <a href="pages/enternaiment.html" class="header__link">Entertainment</a>
            <a href="pages/supplies.html" class="header__link">Supplies</a>
            <button id="btn-logout" class="btn btn--danger header__logout">Exit</button>
        </nav>
    </header>

    <main class="container dashboard">
        
        <!-- Quick Links -->
        <section class="quick-links">
            <a href="https://web.whatsapp.com/" target="_blank" class="quick-links__item" aria-label="WhatsApp">
                <svg role="img" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413Z"/></svg>
            </a>
            <a href="https://www.youtube.com/" target="_blank" class="quick-links__item" aria-label="YouTube">
                <svg role="img" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M23.498 6.186a3.016 3.016 0 0 0-2.122-2.136C19.505 3.545 12 3.545 12 3.545s-7.505 0-9.377.505A3.017 3.017 0 0 0 .502 6.186C0 8.07 0 12 0 12s0 3.93.502 5.814a3.016 3.016 0 0 0 2.122 2.136c1.871.505 9.376.505 9.376.505s7.505 0 9.377-.505a3.015 3.015 0 0 0 2.122-2.136C24 15.93 24 12 24 12s0-3.93-.502-5.814zM9.545 15.568V8.432L15.818 12l-6.273 3.568z"/></svg>
            </a>
            <a href="https://www.crunchyroll.com/" target="_blank" class="quick-links__item" aria-label="Crunchyroll">
                <svg role="img" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M2.909 13.436C2.914 7.61 7.642 2.893 13.468 2.898c5.576.005 10.137 4.339 10.51 9.819q.021-.351.022-.706C24.007 5.385 18.64.006 12.012 0S.007 5.36 0 11.988 5.36 23.994 11.988 24q.412 0 .815-.027c-5.526-.338-9.9-4.928-9.894-10.538Zm16.284.155a4.1 4.1 0 0 1-4.095-4.103 4.1 4.1 0 0 1 2.712-3.855 8.95 8.95 0 0 0-4.187-1.037 9.007 9.007 0 1 0 8.997 9.016q-.001-.847-.15-1.651a4.1 4.1 0 0 1-3.278 1.63Z"/></svg>
            </a>
        </section>

        <!-- DASHBOARD GRID -->
        <div class="dashboard__grid">
            
            <!-- Linha 1: Daily Protocol (Full Width) -->
            <section class="widget widget--full">
                <header class="widget__header">
                    <h2 class="widget__title">Daily Protocol</h2>
                </header>
                <div id="nexts-protocol" class="protocol-scroller">
                    <!-- Preenchido via JS -->
                </div>
            </section>

            <!-- Linha 2: Objetivos, Entretenimento e Supplies -->
            <section class="widget widget--col-1">
                <header class="widget__header">
                    <h2 class="widget__title">Urgent Objectives</h2>
                </header>
                <div id="objectviesHome" class="dashboard-list">
                    <!-- Preenchido via JS -->
                </div>
            </section>

            <section class="widget widget--col-1">
                <header class="widget__header">
                    <h2 class="widget__title">Now Playing / Watching</h2>
                </header>
                <div id="entertainmentHome" class="dashboard-list">
                    <!-- Preenchido via JS -->
                </div>
            </section>

            <section class="widget widget--col-1">
                <header class="widget__header">
                    <h2 class="widget__title">Supplies Control</h2>
                </header>
                <div id="supplies-home" class="dashboard-list dashboard-list--supplies">
                    <!-- Preenchido via JS -->
                </div>
            </section>

            <!-- Linha 3: Notícias e Clima -->
            <section class="widget widget--col-2">
                <header class="widget__header">
                    <h2 class="widget__title">Global News</h2>
                </header>
                <div id="news-feed-container" class="news-grid">
                    <!-- Preenchido via JS -->
                </div>
            </section>

            <section class="widget widget--col-1">
                <header class="widget__header">
                    <h2 class="widget__title">Weather Radar</h2>
                </header>
                <aside id="weather-widget" class="weather-widget">
                    <div id="weather-cards-wrapper" class="weather-cards">
                        <p class="text-small">Loading weather...</p>
                    </div>
                    <div class="weather-widget__form">
                        <input type="text" id="weather-city-input" class="input-field" placeholder="Add city...">
                        <button id="btn-add-city" class="btn btn--primary">Search</button>
                    </div>
                    <p id="weather-city-error" class="weather-widget__error">City not found. Try again.</p>
                </aside>
            </section>

        </div>
    </main>

    <!-- Scripts Modulares -->
    <script src="js/header.js"></script>
    <script src="js/protocolHome.js"></script>
    <script src="js/objectivesHome.js"></script>
    <script src="js/entertainmentHome.js"></script>
    <script src="js/supliesHome.js"></script>
    <script src="js/newsWeather.js"></script>
</body>
</html>
