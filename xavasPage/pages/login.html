<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SYS.HUD // Security Gateway</title>
    
    <link rel="stylesheet" href="../css/style.css">
</head>
<body class="page-auth">

    <main class="auth-container">
        <section class="widget auth-widget">
            <header class="widget__header auth-widget__header">
                <h1 class="txt-heading-md" style="letter-spacing: 0.15em;">RESTRICTED ACCESS</h1>
                <p class="txt-micro" style="color: var(--accent-alert); margin-top: 4px;">IDENTIFICATION REQUIRED</p>
            </header>

            <form id="auth-form" class="widget__body auth-form">
                <div class="form-group">
                    <input type="text" id="input-username" class="input-field" placeholder="Enter ID..." required autocomplete="off">
                </div>

                <div class="form-group">
                    
                    <input type="password" id="input-password" class="input-field" placeholder="••••••••" required>
                </div>

                <div id="auth-error" class="sys-msg sys-msg--error" style="display: none;">
                    ACCESS DENIED.
                </div>

                <div class="auth-actions">
                    <button type="submit" class="btn btn--primary" style="width: 100%; padding: var(--sp-3);">Authorize</button>
                </div>
            </form>
        </section>
    </main>

    <script src="../js/pages/login.js" type="module"></script>
</body>
</html>
