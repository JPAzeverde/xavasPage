<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>xavasPage — SUPPLY LINES (Consumables)</title>
  <link rel="stylesheet" href="../css/global.css">
  <link rel="stylesheet" href="../css/consumables.css">
</head>
<body>
  <div class="dashboard-layout">
    <div id="sidebar-container"></div>
    <main class="main-content">
      <h2>&#x1F4E6; SUPPLY LINES (Consumables)</h2>
      <div class="tabs" id="consumablesTabs"></div>
      <div style="margin-bottom: var(--spacing-md); display: flex; gap: var(--spacing-sm);">
        <button id="addNewItemBtn" class="btn btn-primary">&#x2795; NEW ITEM</button>
        <button id="addExistingItemBtn" class="btn btn-secondary">&#x1F50D; NEW FROM EXISTING</button>
      </div>
      <div id="supplyGrid" class="supply-grid"></div>
    </main>
  </div>

  <!-- Modal: New Item (manual or from existing) -->
  <div id="newItemModal" class="overlay hidden">
    <div class="modal">
      <div class="card-header">
        <h3 id="newItemModalTitle">NEW SUPPLY ITEM</h3>
        <button id="closeNewItemModal" class="btn btn-ghost btn-icon">&times;</button>
      </div>
      <form id="newItemForm">
        <div>
          <label for="newItemName">Item Name *</label>
          <input type="text" id="newItemName" required>
        </div>
        <div>
          <label for="newItemBrand">Brand</label>
          <input type="text" id="newItemBrand">
        </div>
        <div>
          <label for="newItemQuantity">Quantity (with unit) *</label>
          <input type="text" id="newItemQuantity" placeholder="e.g., 250g, 500ml, 12 units" required>
        </div>
        <div>
          <label for="newItemOpenedDate">Opened Date *</label>
          <input type="date" id="newItemOpenedDate" required>
        </div>
        <div class="text-muted" style="margin-bottom: var(--spacing-sm);">
          Estimated End: <span id="newPredictedEnd">—</span>
        </div>
        <button type="submit" class="btn btn-primary w-full">ADD TO INVENTORY</button>
      </form>
    </div>
  </div>

  <!-- Modal: Search existing item -->
  <div id="existingModal" class="overlay hidden">
    <div class="modal">
      <div class="card-header">
        <h3>SELECT EXISTING ITEM</h3>
        <button id="closeExistingModal" class="btn btn-ghost btn-icon">&times;</button>
      </div>
      <input type="text" id="existingSearch" class="search-input" placeholder="Search by name or brand...">
      <div id="existingResults" class="search-list"></div>
    </div>
  </div>

  <!-- Modal: Edit item (opened date only) -->
  <div id="editItemModal" class="overlay hidden">
    <div class="modal">
      <div class="card-header">
        <h3 id="editModalTitle">EDIT SUPPLY ITEM</h3>
        <button id="closeEditModal" class="btn btn-ghost btn-icon">&times;</button>
      </div>
      <form id="editItemForm">
        <div>
          <label>Item Name</label>
          <input type="text" id="editItemName" readonly>
        </div>
        <div>
          <label>Brand</label>
          <input type="text" id="editItemBrand" readonly>
        </div>
        <div>
          <label>Quantity</label>
          <input type="text" id="editItemQuantity" readonly>
        </div>
        <div>
          <label for="editItemOpenedDate">Opened Date *</label>
          <input type="date" id="editItemOpenedDate" required>
        </div>
        <div class="text-muted" style="margin-bottom: var(--spacing-sm);">
          Predicted End: <span id="editPredictedEnd">—</span>
        </div>
        <button type="submit" class="btn btn-primary w-full">UPDATE</button>
      </form>
    </div>
  </div>

  <!-- Scripts -->
  <script src="../js/auth.js"></script>
  <script src="../js/session.js"></script>
  <script src="../js/utils.js"></script>
  <script src="../js/navigation.js"></script>
  <script src="../js/consumables.js"></script>
  <script>
    requireAuth();
    renderSidebar('sidebar-container');
  </script>
</body>
</html>
