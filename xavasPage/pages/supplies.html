<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Supplies - HUB</title>
    
    <link rel="stylesheet" href="../css/styles.css">
    <link rel="stylesheet" href="../css/supplies.css">

    <script src="../js/guard.js"></script>
</head>
<body class="layout-dashboard">

    <header class="header">
        <div class="header__brand">
            <a href="../index.html" class="header__logo">
                <h1 class="title-lg">HUB</h1>
            </a>
            <p class="text-small header__status">Online</p>
        </div>

        <button id="btn-menu" class="btn btn--ghost header__menu-toggle">Menu</button>

        <nav id="main-nav" class="header__nav">
            <a href="protocol.html" class="header__link">Protocol</a>
            <a href="operations.html" class="header__link">Operations</a>
            <a href="enternaiment.html" class="header__link">Entertainment</a>
            <a href="supplies.html" class="header__link header__link--active">Supplies</a>
            <button id="btn-logout" class="btn btn--danger header__logout">Exit</button>
        </nav>
    </header>

    <main class="container supplies">
        
        <section class="supplies__hero">
            <h2 class="title-lg">Supplies</h2>
            <button id="btn-toggle-form" class="btn btn--primary">+ Item</button>
        </section>

        <!-- Modal de Novo Suprimento -->
        <div id="modal-supply-form" class="modal modal--hidden">
            <article class="modal__content card">
                <header class="modal__header">
                    <h2 class="title-md">New Supply</h2>
                </header>
                
                <form id="form-supply" class="modal__body">
                    <div class="form-group">
                        <input type="text" id="input-name" class="input-field" placeholder="Item Name" required>
                    </div>
                    
                    <div class="form-group">
                        <input type="text" id="input-brand" class="input-field" placeholder="Brand" required>
                    </div>
                    
                    <div class="form-group">
                        <input type="url" id="input-url" class="input-field" placeholder="Image URL" required>
                    </div>
                    
                    <div class="form-group">
                        <input type="text" id="input-qnt" class="input-field" placeholder="Quantity (ml/un/g)" required>
                    </div>
                    
                    <div class="form-group">
                        <select id="input-tag" class="select-field" required>
                            <option value="">Select a tag</option>
                            <option value="health">Health</option>
                            <option value="nutrition">Nutrition</option>
                            <option value="hygiene">Hygiene</option>
                            <option value="cleaning">Cleaning</option>
                            <option value="other">Other</option>
                        </select>
                    </div>
                    
                    <div class="form-group form-group--checkbox">
                        <input type="checkbox" id="input-opened" class="checkbox-field">
                        <label for="input-opened" class="text-small">Opened Today?</label>
                    </div>
                    
                    <footer class="modal__footer">
                        <button type="button" id="btn-close-supply-modal" class="btn btn--ghost">Cancel</button>
                        <button type="submit" class="btn btn--primary">Add Supply</button>
                    </footer>
                </form>
            </article>
        </div>

        <section class="inventory">
            <div class="inventory__category">
                <header class="inventory__header"><h3 class="title-sm">Stock</h3></header>
                <div id="grid-stock" class="inventory__grid"></div>
            </div>
            
            <div class="inventory__category">
                <header class="inventory__header"><h3 class="title-sm">Opened</h3></header>
                <div id="grid-opened" class="inventory__grid"></div>
            </div>
            
            <div class="inventory__category">
                <header class="inventory__header"><h3 class="title-sm">Ended</h3></header>
                <div id="grid-ended" class="inventory__grid"></div>
            </div>
        </section>

    </main>

    <div id="modal-product" class="modal modal--hidden">
        <article class="modal__content card">
            <header class="modal__header">
                <h3 id="modal-title" class="title-md">Product</h3>
            </header>
            
            <div class="modal__body">
                <p id="modal-desc" class="text-body"></p>
                
                <div class="form-group" id="modal-date-group">
                    <label id="modal-date-label" class="text-small">Date:</label>
                    <input type="date" id="modal-date" class="input-field">
                </div>
            </div>

            <footer class="modal__footer">
                <div class="modal__actions">
                    <button id="modal-btn-close" class="btn btn--ghost">Cancel</button>
                    <button id="modal-btn-confirm" class="btn btn--primary">Save</button>
                </div>
                <button id="modal-btn-delete" class="btn btn--danger">Delete Item</button>
            </footer>
        </article>
    </div>

    <script src="../js/supplies.js" type="module"></script>
</body>
</html>
