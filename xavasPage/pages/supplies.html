<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SYS.HUD // Logistics & Supplies</title>
    
    <link rel="stylesheet" href="../css/style.css">

    <script src="../js/core/guard.js"></script>
</head>
<body>

    <header class="hud-header">
        <div class="hud-header__brand">
            <a href="../index.html" class="txt-heading-lg" style="letter-spacing: 0.1em;">SYS.HUD</a>
            <p class="txt-micro hud-header__status">SYSTEM ONLINE</p>
        </div>

        <button id="btn-menu" class="btn btn--ghost hud-header__toggle" style="display: none;">Uplink</button>

        <nav id="main-nav" class="hud-header__nav">
            <a href="protocol.html" class="hud-header__link">Protocol</a>
            <a href="operations.html" class="hud-header__link">Operations</a>
            <a href="entertainment.html" class="hud-header__link">Entertainment</a>
            <a href="supplies.html" class="hud-header__link is-active">Supplies</a>
            <button id="btn-logout" class="btn btn--danger">Terminate</button>
        </nav>
    </header>

    <main class="container" style="padding-top: var(--sp-6);">
        
        <section class="widget" style="margin-bottom: var(--sp-6);">
            <div class="widget__header" style="display: flex; justify-content: space-between; align-items: center;">
                <h2 class="txt-micro">Logistics & Inventory</h2>
                <button id="btn-toggle-form" class="btn btn--primary">Log Asset</button>
            </div>
        </section>

        <section class="inventory-matrix">
            
            <div class="inventory-col">
                <header class="inventory-col__header">
                    <h3 class="txt-micro">STOCK</h3>
                </header>
                <div id="grid-stock" class="inventory-col__grid"></div>
            </div>
            
            <div class="inventory-col">
                <header class="inventory-col__header">
                    <h3 class="txt-micro" style="color: var(--accent-useItem);">ACTIVE</h3>
                </header>
                <div id="grid-opened" class="inventory-col__grid"></div>
            </div>
            
            <div class="inventory-col">
                <header class="inventory-col__header">
                    <h3 class="txt-micro" style="color: var(--text-muted);">DEPLETED</h3>
                </header>
                <div id="grid-ended" class="inventory-col__grid"></div>
            </div>

        </section>
    </main>

    <div id="modal-supply-form" class="modal-overlay modal--hidden">
        <article class="widget modal-content">
            <header class="widget__header">
                <h2 class="txt-micro" style="color: var(--text-primary);">Asset Registration</h2>
            </header>
            
            <form id="form-supply" class="widget__body">
                <div class="form-group">
                    <input type="text" id="input-name" class="input-field" placeholder="Asset Designation (Name)" required>
                </div>
                
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: var(--sp-4);">
                    <div class="form-group">
                        <input type="text" id="input-brand" class="input-field" placeholder="Manufacturer (Brand)" required>
                    </div>
                    <div class="form-group">
                        <input type="text" id="input-qnt" class="input-field" placeholder="Volume/Qty (ml/un/g)" required>
                    </div>
                </div>

                <div class="form-group">
                    <input type="url" id="input-url" class="input-field" placeholder="Visual Reference URL" required>
                </div>
                
                <div class="form-group">
                    <select id="input-tag" class="input-field" required>
                        <option value="">Select Classification...</option>
                        <option value="health">Health / Meds</option>
                        <option value="nutrition">Nutrition</option>
                        <option value="hygiene">Hygiene</option>
                        <option value="cleaning">Cleaning</option>
                        <option value="other">Unclassified</option>
                    </select>
                </div>
                
                <div class="form-group" style="flex-direction: row; align-items: center; gap: var(--sp-2); margin-top: var(--sp-2);">
                    <input type="checkbox" id="input-opened" style="accent-color: var(--text-primary); cursor: pointer;">
                    <label for="input-opened" class="txt-micro" style="cursor: pointer;">Deployed Immediately? (Opened Today)</label>
                </div>
                
                <footer style="display: flex; gap: var(--sp-3); margin-top: var(--sp-4); border-top: 1px dashed var(--border-dark); padding-top: var(--sp-4);">
                    <button type="button" id="btn-close-supply-modal" class="btn btn--ghost" style="flex: 1;">Abort</button>
                    <button type="submit" class="btn btn--primary" style="flex: 1;">Authorize Registration</button>
                </footer>
            </form>
        </article>
    </div>

    <div id="modal-product" class="modal-overlay modal--hidden">
        <article class="widget modal-content">
            <header class="widget__header">
                <h3 id="modal-title" class="txt-micro" style="color: var(--text-primary);">Update Asset Status</h3>
            </header>
            
            <div class="widget__body">
                <p id="modal-desc" class="txt-body" style="text-align: center; margin-bottom: var(--sp-4);"></p>
                
                <div class="form-group" id="modal-date-group">
                    <label id="modal-date-label" class="txt-micro">Timestamp:</label>
                    <input type="date" id="modal-date" class="input-field">
                </div>
            </div>

            <footer style="display: flex; flex-direction: column; gap: var(--sp-3); border-top: 1px dashed var(--border-dark); padding: var(--sp-4);">
                <div style="display: flex; gap: var(--sp-3);">
                    <button id="modal-btn-close" class="btn btn--ghost" style="flex: 1;">Abort</button>
                    <button id="modal-btn-confirm" class="btn btn--primary" style="flex: 1;">Authorize</button>
                </div>
                <button id="modal-btn-delete" class="btn btn--danger" style="width: 100%;">Scrub Asset (Delete)</button>
            </footer>
        </article>
    </div>

    <script src="../js/components/header.js"></script>
    <script src="../js/pages/supplies.js" type="module"></script>
</body>
</html>
