<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>xavasPage — MISSION LOG (Tasks)</title>
  <link rel="stylesheet" href="../css/global.css">
  <link rel="stylesheet" href="../css/tasks.css">
</head>
<body>
  <div class="dashboard-layout">
    <!-- Sidebar -->
    <div id="sidebar-container"></div>

    <!-- Main -->
    <main class="main-content">
      <h2>&#x1F4CB; MISSION LOG (Tasks)</h2>
      <div class="tabs" id="tasksTabs"></div>

      <div class="tasks-toolbar">
        <div class="month-navigator">
          <button id="prevMonthBtn" class="btn btn-ghost btn-icon" title="Previous month">&#x25C0;</button>
          <span id="monthLabel">January 2026</span>
          <button id="nextMonthBtn" class="btn btn-ghost btn-icon" title="Next month">&#x25B6;</button>
        </div>
        <button id="addTaskBtn" class="btn btn-primary">&#x2795; NEW MISSION</button>
      </div>

      <div id="calendarGrid" class="calendar-grid"></div>
    </main>
  </div>

  <!-- Add/Edit Modal -->
  <div id="taskModal" class="overlay hidden">
    <div class="modal">
      <div class="card-header">
        <h3 id="modalTitle">NEW MISSION</h3>
        <button id="closeModalBtn" class="btn btn-ghost btn-icon">&times;</button>
      </div>
      <form id="taskForm">
        <div>
          <label for="taskName">Mission Name *</label>
          <input type="text" id="taskName" required>
        </div>
        <div>
          <label for="taskTag">Tag</label>
          <input type="text" id="taskTag" list="tagsList" placeholder="personal, freelance, unilavras...">
          <datalist id="tagsList">
            <option value="personal">
            <option value="freelance">
            <option value="unilavras">
            <option value="health">
            <option value="work">
            <option value="other">
          </datalist>
        </div>
        <div>
          <label for="taskDate">Date *</label>
          <input type="date" id="taskDate" required>
        </div>
        <div>
          <label for="taskTime">Time (optional)</label>
          <input type="time" id="taskTime">
        </div>
        <div>
          <label for="taskEndDate">End Date (optional)</label>
          <input type="date" id="taskEndDate">
        </div>
        <div>
          <label for="taskStatus">Status</label>
          <select id="taskStatus">
            <option value="To Do">To Do</option>
            <option value="In Progress">In Progress</option>
            <option value="Completed">Completed</option>
            <option value="Forgotten">Forgotten</option>
          </select>
        </div>
        <button type="submit" class="btn btn-primary w-full">SAVE MISSION</button>
        <button type="button" id="deleteTaskBtn" class="btn btn-danger w-full mt-sm hidden" style="display:none;">&#x1F5D1; DELETE MISSION</button>
      </form>
    </div>
  </div>

  <!-- Scripts -->
  <script src="../js/auth.js"></script>
  <script src="../js/session.js"></script>
  <script src="../js/utils.js"></script>
  <script src="../js/navigation.js"></script>
  <script src="../js/tasks.js"></script>
  <script>
    requireAuth();
    renderSidebar('sidebar-container');
    // Exibir botão de deletar apenas ao editar
    const observer = new MutationObserver(() => {
      const deleteBtn = document.getElementById('deleteTaskBtn');
      if (deleteBtn) {
        deleteBtn.style.display = editingTaskId ? 'block' : 'none';
      }
    });
    observer.observe(document.getElementById('taskModal'), { attributes: true, attributeFilter: ['class'] });
  </script>
</body>
</html>
