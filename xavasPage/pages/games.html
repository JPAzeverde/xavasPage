<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>xavasPage — ARMORY (Games)</title>
  <link rel="stylesheet" href="../css/global.css">
  <link rel="stylesheet" href="../css/games.css">
  <link rel="stylesheet" href="../css/home.css">
</head>
<body>
  <div class="dashboard-layout">
    <!-- Sidebar -->
    <div id="sidebar-container"></div>

    <!-- Main -->
    <main class="main-content">
      <h2>&#x1F3AE; OPERATIONS (GAMES)</h2>
      <div class="tabs" id="gamesTabs"></div>
      
      <div style="margin-bottom: var(--spacing-lg);">
        <button id="addGameBtn" class="btn btn-primary">&#x2795; NEW OPERATION</button>
      </div>

      <div id="gamesGrid" class="games-grid"></div>
    </main>
  </div>

  <!-- Add/Edit Modal -->
  <div id="gameModal" class="overlay hidden">
    <div class="modal">
      <div class="card-header">
        <h3 id="modalTitle">NEW OPERATION</h3>
        <button id="closeModalBtn" class="btn btn-ghost btn-icon">&times;</button>
      </div>
      <form id="gameForm">
        <div>
          <label for="gameName">Operation Name *</label>
          <input type="text" id="gameName" required>
        </div>
        <div>
          <label for="gameCover">Cover Image URL</label>
          <input type="url" id="gameCover" placeholder="https://...">
        </div>
        <div>
          <label for="gameYear">Release Year *</label>
          <input type="number" id="gameYear" min="1950" max="2099" value="2024" required>
        </div>
        <div>
          <label for="gamePlatform">Platform</label>
          <input type="text" id="gamePlatform" list="platformList" placeholder="e.g., PC, PS5">
          <datalist id="platformList">
            <!-- Suggestions will be populated by JS or hardcoded? We'll add static for simplicity -->
            <option value="PC">
            <option value="PS4">
            <option value="PS5">
            <option value="Xbox One">
            <option value="Xbox Series X/S">
            <option value="Nintendo Switch">
            <option value="Nintendo 64">
            <option value="GameCube">
            <option value="Wii">
            <option value="Wii U">
            <option value="Game Boy">
            <option value="Game Boy Advance">
            <option value="Nintendo DS">
            <option value="Nintendo 3DS">
            <option value="PSP">
            <option value="PS Vita">
            <option value="Mobile">
            <option value="Browser">
            <option value="Other">
          </datalist>
        </div>
        <div class="checkbox-row">
          <input type="checkbox" id="gameEmulator">
          <label for="gameEmulator" style="display:inline; margin-bottom:0;">Emulator Used</label>
        </div>
        <div>
          <label for="gameScore">Score</label>
          <div class="range-container">
            <input type="range" id="gameScore" min="0" max="100" value="50">
            <span id="gameScoreValue" class="range-value">50</span>
          </div>
        </div>
        <div>
          <label for="gameStatus">Status</label>
          <select id="gameStatus">
            <option value="To Play">To Play</option>
            <option value="In Progress">In Progress</option>
            <option value="Completed">Completed</option>
            <option value="Dropped">Dropped</option>
          </select>
        </div>
        <button type="submit" class="btn btn-primary w-full">SAVE MISSION</button>
      </form>
    </div>
  </div>

  <!-- Scripts -->
  <script src="../js/auth.js"></script>
  <script src="../js/session.js"></script>
  <script src="../js/utils.js"></script>
  <script src="../js/navigation.js"></script>
  <script src="../js/games.js"></script>
  <script>
    // Check auth & render sidebar
    requireAuth();
    renderSidebar('sidebar-container');
  </script>
</body>
</html>
