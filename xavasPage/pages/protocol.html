<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SYS.HUD // Protocol Directive</title>
    
    <link rel="stylesheet" href="../css/style.css">
    
    <script src="../js/core/guard.js" type="module"></script>
</head>
<body>

    <header class="hud-header">
        <div class="hud-header__brand">
            <a href="../index.html" class="txt-heading-lg" style="letter-spacing: 0.1em;">SYS.HUD</a>
            <p class="txt-micro hud-header__status">SYSTEM ONLINE</p>
        </div>

        <button id="btn-menu" class="btn btn--ghost hud-header__toggle" style="display: none;">Uplink</button>

        <nav id="main-nav" class="hud-header__nav">
            <a href="protocol.html" class="hud-header__link is-active">Protocol</a>
            <a href="operations.html" class="hud-header__link">Operations</a>
            <a href="entertainment.html" class="hud-header__link">Entertainment</a>
            <a href="supplies.html" class="hud-header__link">Supplies</a>
            <button id="btn-logout" class="btn btn--danger">Terminate</button>
        </nav>
    </header>

    <main class="container" style="padding-top: var(--sp-6);">
        
        <section class="widget" style="margin-bottom: var(--sp-6);">
            <div class="widget__header" style="display: flex; justify-content: space-between; align-items: center;">
                <h2 class="txt-micro">7-Day Tactical Matrix</h2>
                <button id="btn-toggle-task-form" class="btn btn--primary">Instantiate Directive</button>
            </div>
        </section>

        <section class="widget" style="overflow-x: auto;">
            <div id="schedule-grid" class="schedule-matrix">
                </div>
        </section>

    </main>

    <div id="modal-task" class="modal-overlay modal--hidden">
        <article class="widget modal-content">
            <header class="widget__header">
                <h2 class="txt-micro" style="color: var(--text-primary);">Awaiting New Directive Input...</h2>
            </header>
            
            <form id="task-form" class="widget__body" style="gap: var(--sp-4);">
                <div class="form-group">
                    <label for="task" class="txt-micro">Parameters (Description)</label>
                    <input type="text" id="task" name="task" class="input-field" placeholder="E.g., System Maintenance..." autocomplete="off" required>
                </div>
                
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: var(--sp-4);">
                    <div class="form-group">
                        <label for="startTime" class="txt-micro">T-Start</label>
                        <input type="time" id="startTime" name="startTime" class="input-field" required>
                    </div>
                    <div class="form-group">
                        <label for="endTime" class="txt-micro">T-End</label>
                        <input type="time" id="endTime" name="endTime" class="input-field">
                    </div>
                </div>
                
                <div class="form-group">
                    <label for="tag" class="txt-micro">Classification</label>
                    <select id="tag" name="tag" class="input-field" required>
                        <option value="">Select Class...</option>
                        <option value="work">Operation/Work</option>
                        <option value="training">Combat/Training</option>
                        <option value="study">Intel/Study</option>
                        <option value="health">Biometrics/Health</option>
                        <option value="nutrition">Rations/Nutrition</option>
                        <option value="personal">Personal</option>
                        <option value="other">Unclassified</option>
                    </select>
                </div>
                
                <div class="form-group">
                    <label for="day" class="txt-micro">Cycle (Day)</label>
                    <select id="day" name="day" class="input-field" required>
                        <option value="">Select Cycle...</option>
                        <option value="monday">MONDAY</option>
                        <option value="tuesday">TUESDAY</option>
                        <option value="wednesday">WEDNESDAY</option>
                        <option value="thursday">THURSDAY</option>
                        <option value="friday">FRIDAY</option>
                        <option value="saturday">SATURDAY</option>
                        <option value="sunday">SUNDAY</option>
                    </select>
                </div>
                
                <footer style="display: flex; gap: var(--sp-3); margin-top: var(--sp-2); border-top: 1px dashed var(--border-dark); padding-top: var(--sp-4);">
                    <button type="button" id="btn-close-modal" class="btn btn--ghost" style="flex: 1;">Abort</button>
                    <button type="submit" id="btn-submit-task" class="btn btn--primary" style="flex: 1;">Deploy</button>
                </footer>
            </form>
        </article>
    </div>

    <script src="../js/components/header.js" type="module"></script>
    <script src="../js/pages/protocol.js" type="module"></script>
</body>
</html>
