<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>xavasPage — ROUTINE (Protocol)</title>
  <link rel="stylesheet" href="../css/global.css">
  <link rel="stylesheet" href="../css/protocol.css">
</head>
<body>
  <div class="dashboard-layout">
    <!-- Sidebar -->
    <div id="sidebar-container"></div>

    <!-- Main -->
    <main class="main-content">
      <h2>&#x1F4C5; WEEKLY PROTOCOL</h2>

      <!-- Today's Protocol -->
      <div class="protocol-section">
        <h3 class="section-title">&#x1F5D3; TODAY’S PROTOCOL — <span id="todayName"></span></h3>
        <ul id="todayProtocolList" class="checklist"></ul>
      </div>

      <!-- Weekly Protocol -->
      <div class="protocol-section">
        <h3 class="section-title">&#x1F4C6; WEEKLY OVERVIEW</h3>
        <div style="margin-bottom: var(--spacing-md);">
          <button id="addProtocolBtn" class="btn btn-primary">&#x2795; NEW ROUTINE ITEM</button>
        </div>
        <div id="weeklyProtocolContainer" class="weekly-grid"></div>
      </div>
    </main>
  </div>

  <!-- Add/Edit Modal -->
  <div id="protocolModal" class="overlay hidden">
    <div class="modal">
      <div class="card-header">
        <h3 id="modalTitle">NEW ROUTINE ITEM</h3>
        <button id="closeModalBtn" class="btn btn-ghost btn-icon">&times;</button>
      </div>
      <form id="protocolForm">
        <div>
          <label for="protocolName">Activity Name *</label>
          <input type="text" id="protocolName" required>
        </div>
        <div>
          <label for="protocolTag">Tag</label>
          <input type="text" id="protocolTag" list="tagsList" placeholder="personal, work, health...">
          <datalist id="tagsList">
            <option value="personal">
            <option value="freelance">
            <option value="unilavras">
            <option value="health">
            <option value="work">
          </datalist>
        </div>
        <div>
          <label for="protocolDay">Day of Week *</label>
          <select id="protocolDay" required>
            <option value="Monday">Monday</option>
            <option value="Tuesday">Tuesday</option>
            <option value="Wednesday">Wednesday</option>
            <option value="Thursday">Thursday</option>
            <option value="Friday">Friday</option>
            <option value="Saturday">Saturday</option>
            <option value="Sunday">Sunday</option>
          </select>
        </div>
        <div class="inline-group">
          <div>
            <label for="protocolStart">Start Time *</label>
            <input type="time" id="protocolStart" required>
          </div>
          <div>
            <label for="protocolEnd">End Time (optional)</label>
            <input type="time" id="protocolEnd">
          </div>
        </div>
        <button type="submit" class="btn btn-primary w-full">SAVE ROUTINE</button>
        <button type="button" id="deleteProtocolBtn" class="btn btn-danger w-full mt-sm" style="display:none;">&#x1F5D1; DELETE ROUTINE</button>
      </form>
    </div>
  </div>

  <!-- Scripts -->
  <script src="../js/auth.js"></script>
  <script src="../js/session.js"></script>
  <script src="../js/utils.js"></script>
  <script src="../js/navigation.js"></script>
  <script src="../js/protocol.js"></script>
  <script>
    requireAuth();
    renderSidebar('sidebar-container');
    // Display today's name in the header
    const today = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'][new Date().getDay()];
    document.getElementById('todayName').textContent = today.toUpperCase();
  </script>
</body>
</html>
