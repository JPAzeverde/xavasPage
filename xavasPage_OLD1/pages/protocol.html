<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Protocol Hub</title>
    <link rel="stylesheet" href="../css/styles.css">
    <link rel="stylesheet" href="../css/protocol.css">
    <script src="../js/guard.js"></script>
</head>
<body>
    <header id="main-header" class="header-container">
        <div id="header-01">
            <a href="../index.html" id="logo-header">
                <h1 id="welcome-title">HUB</h1>
            </a>
            <p id="welcome-subtitle">Online</p>
        </div>

        <button id="menu-header" class="btn-primary btn-menu">Menu</button>

        <div id="header-02">
            <a href="protocol.html" class="link-header">Protocol</a>
            <a href="operations.html" class="link-header">Operations</a>
            <a href="enternaiment.html" class="link-header">Entertainment</a>
            <a href="supplies.html" class="link-header">Supplies</a>
            <a href="training.html" class="link-header" style="display: none;">Training</a>
            <button id="btn-logout" class="btn-danger">Exit</button>
        </div>
    </header>

    <section id="protocol-hero" class="container protocol-hero">
        <h1>Week Protocol</h1>
        <button id="btn-toggle-task-form" class="btn-primary">+ Task</button>
    </section>

    <section id="task-form-section" class="task-form-section">
        <form id="task-form" class="task-form">
            <div class="form-group">
                <input type="text" id="task" name="task" placeholder="Task description..." required>
            </div>
            
            <div class="form-group">
                <input type="time" id="startTime" name="startTime" class="form-input-time" required>
                <label for="startTime">Start Time</label>
            </div>
            
            <div class="form-group">
                <input type="time" id="endTime" name="endTime" class="form-input-time">
                <label for="endTime">End Time</label>
            </div>
            
            <div class="form-group">
                <select id="tag" name="tag" class="form-select" required>
                    <option value="">Select a tag</option>
                    <option value="work">Work</option>
                    <option value="training">Training</option>
                    <option value="study">Study</option>
                    <option value="health">Health</option>
                    <option value="nutrition">Nutrition</option>
                    <option value="personal">Personal</option>
                    <option value="hygiene">Hygiene</option>
                    <option value="cleaning">Cleaning</option>
                    <option value="other">Other</option>
                </select>
            </div>
            
            <div class="form-group">
                <select id="day" name="day" class="form-select" required>
                    <option value="">Select a day</option>
                    <option value="monday">MONDAY</option>
                    <option value="tuesday">TUESDAY</option>
                    <option value="wednesday">WEDNESDAY</option>
                    <option value="thursday">THURSDAY</option>
                    <option value="friday">FRIDAY</option>
                    <option value="saturday">SATURDAY</option>
                    <option value="sunday">SUNDAY</option>
                </select>
            </div>
            
            <button type="submit" id="btn-submit-task" class="btn-primary">ADD</button>
        </form>
    </section>

    <section id="protocol-schedule" class="container protocol-schedule">
        <div class="schedule-grid">
            </div>
    </section>

    <script src="../js/protocol.js"></script>
    <script>
        document.getElementById('btn-logout').addEventListener('click', function() {
            sessionStorage.removeItem('portal_pessoal_auth');
            window.location.replace('login.html');
        });
    </script>
</body>
</html>
